<html>
  <meta charset="utf-8"/>
  
  <head>
    <link rel="stylesheet" href="jiggle.css">
    <link rel="stylesheet" href="index.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  </head>
  
  <body>
    <div class=title>பாடல்: ஜீவ சரடு வாத்தியத்தில்: வரவீனா ம்ருதுபாணி</div>
    <div class=subtitle>ராகம்: மோகணம், தாளம்: ரூபகம்</div>

    
    <div style="text-align:center;">
      <button id=btn onclick="start()">Click to start</button>
    </div>

    <div id=main>

      <!--   400 (varaveena) -->                    <!--  8200 (mridu) -->
      <span id=p0 class=hidden>வரவீனா </span>        <span id=p1 class=hidden>ம்ருதுபாணி</span> <br>
      <!--  12000 (vanaruha) -->                     <!-- 16200 -->
      <span id=p2 class=hidden>வனருஹ லோ-</span>   <span id=p3 class=hidden>-சன ராணி</span> <p>


      <!-- 20800 (suruchira) -->                     <!-- 24200 -->
      <span id=p4 class=hidden>சுருசிர பம்-</span>     <span id=p5 class=hidden>-பர வேணி</span>   <br>
      <!-- 28000 (suranutha) -->                     <!-- 32200 -->
      <span id=p6 class=hidden>சுரனுத கல்-</span>     <span id=p7 class=hidden>-யாணி</span>  <p>
   
      <!-- 36100 (nirupama) -->                      <!-- 40200 -->
      <span id=p8 class=hidden>நிருபம சுப</span>      <span id=p9 class=hidden>குண லோலா</span> <br>
      <!-- 44200 (niradisa) -->                      <!-- 48200  -->
      <span id=p10 class=hidden>நிரதிசயா</span>       <span id=p11 class=hidden>ப்ரத சீலா</span> <p>

      <!-- 52200 (varadaapriya) -->                   <!-- 56200 (varadaapriya) -->
      <span id=p12 class=hidden>வரதாப்பிரிய</span>     <span id=p13 class=hidden>ரங்கநாயகி</span> <br>
      <!-- 60100 (vanjitha) -->                       <!-- 64200 -->
      <span id=p14 class=hidden>வாஞ்சித பல</span>    <span id=p15 class=hidden>தாயகி</span> <p>

      <!-- 68200 (sarasija) -->                      <!--  72200 (sarasija) -->
      <span id=p16 class=hidden>சரசீஜ</span>          <span id=p17 class=hidden>சன ஜனனி</span> <br>

      <!-- 76200 (jaya jaya jaya) -->
      <span id=p18 class=hidden>ஜய ஜய ஜய</span>
    </div>

    <script src=varaveena.js></script>
